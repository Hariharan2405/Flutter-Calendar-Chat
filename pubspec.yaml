name: calendar_app
description: Calendar with Tamil Nadu Holidays, Notes and Expense Tracker
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.0.0

  # Calendar
  table_calendar: ^3.1.2

  # Charts
  fl_chart: ^0.69.0

  # State Management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # Chat - audio
  record: ^6.0.0
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

  # Notifications
  flutter_local_notifications: ^17.2.0

  # Chat enhancements
  image_picker: ^1.1.2
  emoji_picker_flutter: ^4.4.0
  cached_network_image: ^3.4.1
  http: ^1.2.2

  # Voice & video calls — Agora handles all NAT/TURN internally
  agora_rtc_engine: ^6.3.2

  # Persistence
  shared_preferences: ^2.3.2
  package_info_plus: ^8.0.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  image: ^4.0.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#5C35D1"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  # Reduce APK size by stripping debug info from native libs
  # (debug symbols are saved separately for crash reporting)

  assets:
    - assets/sounds/
